<!-- Search Overlay -->
<div id="search-overlay" data-search-url="{{ '/search.json' | relative_url }}" class="hidden fixed inset-0 z-[100] bg-zinc-950/90 backdrop-blur-sm flex items-start justify-center pt-24 px-6">
  <div class="w-full max-w-2xl bg-zinc-900 border border-zinc-700 rounded-2xl shadow-2xl overflow-hidden">

    <!-- Search input -->
    <div class="flex items-center gap-3 px-5 py-4 border-b border-zinc-800">
      <svg class="w-5 h-5 text-zinc-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search projects, docs, posts..."
        class="flex-1 bg-transparent outline-none text-zinc-100 placeholder-zinc-500 font-body text-base" />
      <kbd class="hidden sm:block text-xs font-mono text-zinc-500 border border-zinc-700 rounded px-2 py-1">ESC</kbd>
    </div>

    <!-- Results -->
    <div id="search-results" class="max-h-96 overflow-y-auto py-2">
      <p class="text-center text-zinc-500 text-sm py-8 font-mono">Start typing to search...</p>
    </div>

    <!-- Footer hint -->
    <div class="px-5 py-3 border-t border-zinc-800 flex gap-4 text-xs text-zinc-600 font-mono">
      <span><kbd class="border border-zinc-700 rounded px-1">↑↓</kbd> navigate</span>
      <span><kbd class="border border-zinc-700 rounded px-1">↵</kbd> select</span>
      <span><kbd class="border border-zinc-700 rounded px-1">ESC</kbd> close</span>
    </div>
  </div>
</div>
