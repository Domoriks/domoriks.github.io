---
layout: default
---
<article class="max-w-3xl mx-auto px-6 py-24">

  <a href="{{ '/blog' | relative_url }}" class="inline-flex items-center gap-2 text-zinc-500 hover:text-forge-400 transition-colors mb-10 font-mono text-sm">← Blog</a>

  <header class="mb-10">
    <div class="flex gap-3 mb-4 flex-wrap">
      {% for tag in page.tags %}
      <span class="px-3 py-1 bg-forge-950 border border-forge-800 text-forge-400 rounded-full text-xs font-mono">{{ tag }}</span>
      {% endfor %}
    </div>
    <h1 class="font-display text-4xl font-bold mb-4 leading-tight">{{ page.title }}</h1>
    <p class="text-zinc-500 font-mono text-sm">
      {{ page.date | date: "%B %d, %Y" }}
      {% if page.author %} · {{ page.author }}{% endif %}
    </p>
  </header>

  {% if page.image %}
  <img src="{{ page.image }}" alt="{{ page.title }}" class="w-full h-72 object-cover rounded-2xl mb-10 border border-zinc-800" loading="lazy" />
  {% endif %}

  <div class="prose prose-invert prose-zinc max-w-none
    prose-headings:font-display
    prose-code:font-mono prose-code:text-forge-400
    prose-a:text-forge-400 prose-a:no-underline hover:prose-a:underline">
    {{ content }}
  </div>

</article>
